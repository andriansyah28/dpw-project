<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - 09.09.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="timer-container">
            <div class="timer-item"><span id="days">00</span><p>Hari</p></div>
            <div class="timer-item"><span id="hours">00</span><p>Jam</p></div>
            <div class="timer-item"><span id="minutes">00</span><p>Menit</p></div>
            <div class="timer-item"><span id="seconds">00</span><p>Detik</p></div>
        </div>

        <div class="card-wedding">
            <div class="side-image">
                <img src="image1.png" alt="Wedding Photo">
            </div>

            <div class="side-content">
                <h2 class="script-font">The Wedding</h2>
                <h3 class="info-title">Acara akan dilaksanakan pada:</h3>
                
                <div class="info-details">
                    <div class="detail-row">
                        <span class="label">Tanggal</span>
                        <span class="val">: 09 / 09 / 2026</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Jam</span>
                        <span class="val">: 08.00 WIB - Selesai</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Lokasi</span>
                        <span class="val">: Jl. Jendral Basuki Rachmat No.106, Surabaya</span>
                    </div>
                </div>

                <a href="https://maps.google.com" target="_blank" class="btn-map">LIHAT LOKASI</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

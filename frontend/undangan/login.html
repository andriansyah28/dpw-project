<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Undangan Pernikahan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left-form">
            <div class="form-container">
                <h1 class="login-title">WELCOME</h1>
                <p class="login-subtitle">Log in to your account</p>
                
                <form class="actual-form" id="login-form">

                    <div class="input-set">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="username">
                    </div>
                    
                    <div class="input-set">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="password">
                            <span class="lock-svg" id="toggle-password">
                                <!-- Closed Lock -->
                                <svg class="lock-icon-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <!-- Open Lock -->
                                <svg class="lock-icon-open" style="display: none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 8-4.46"></path>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="login-submit-btn">Login</button>
                </form>
                
                <p class="login-footer">Dont have an account? <a href="#">sign in</a></p>
            </div>
        </div>
        <div class="login-right-image">
            <div class="overlay-photo">
                <img src="/frontend/assets/image1.png" alt="background 1">
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
